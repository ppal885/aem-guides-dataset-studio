services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dataset-studio-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dataset_studio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    networks:
      - app-network

  # Redis (for future Celery tasks)
  redis:
    image: redis:7-alpine
    container_name: dataset-studio-redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataset-studio-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dataset_studio}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      STRUCTURED_LOGGING: ${STRUCTURED_LOGGING:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      STORAGE_PATH: ${STORAGE_PATH:-/app/datasets}
      CLEANUP_ENABLED: ${CLEANUP_ENABLED:-true}
      CLEANUP_DAYS_OLD: ${CLEANUP_DAYS_OLD:-7}
      CLEANUP_SCHEDULE: ${CLEANUP_SCHEDULE:-0 2 * * *}
      JIRA_URL: ${JIRA_URL:-}
      JIRA_USERNAME: ${JIRA_USERNAME:-}
      JIRA_PASSWORD: ${JIRA_PASSWORD:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-}
      JIRA_API_VERSION: ${JIRA_API_VERSION:-2}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - backend_logs:/app/logs
      - dataset_storage:/app/storage/datasets
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    networks:
      - app-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataset-studio-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # Celery Worker (optional - uncomment if needed)
  # worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: dataset-studio-worker
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/dataset_studio}
  #     REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  #     LOG_LEVEL: ${LOG_LEVEL:-INFO}
  #     ENVIRONMENT: ${ENVIRONMENT:-production}
  #   command: celery -A app.tasks.celery_app worker --loglevel=info --uid=nobody --gid=nogroup
  #   volumes:
  #     - backend_logs:/app/logs
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - app-network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  dataset_storage:
    driver: local

networks:
  app-network:
    driver: bridge
